server:
  port: 8080

spring:
  application:
    name: securebank-360
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/securebank}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-64-char-minimum-length-key}
    expiration-ms: 86400000
  security:
    mfa-enabled: true
    max-login-attempts: 5

logging:
  level:
    com.banking: INFO
    org.springframework.security: WARN
